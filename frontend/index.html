<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AniSearch</title>
</head>
<body>

<h1>AniSearch</h1>

<div id="anime-list"></div>

<script>
const API_URL = "https://anisearch-il-production.up.railway.app/api/latest";

async function loadAnime() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const container = document.getElementById("anime-list");
        container.innerHTML = "";

        data.forEach(anime => {
            const div = document.createElement("div");
            div.style.marginBottom = "20px";

            div.innerHTML = `
                <h2>${anime.title}</h2>
                <p>Episode: ${anime.episode}</p>
                <img src="${anime.image}" width="150">
            `;

            container.appendChild(div);
        });

    } catch (err) {
        console.error("Error:", err);
        document.getElementById("anime-list").innerText = "Failed to load data";
    }
}

loadAnime();
</script>

</body>
</html>
